<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light dark" />
		<title>Vite + Preact</title>
	</head>
	<body>
		<div id="app"></div>
		<template id="game-skeleton">
			<!-- Injected at build time by calculate:inject-skeleton -->
		</template>
		<script>
			// biome-ignore lint/complexity/useArrowFunction: This inline fallback runs before legacy bundles.
			(function () {
				var url = new URL(window.location.href);
				var match = url.pathname.match(/(?:^|\/)game\/(easy|medium|hard)\/?$/);
				var stage = url.searchParams.get("stage");
				var app = document.getElementById("app");
				var template = document.getElementById("game-skeleton");
				var difficulty;
				var clone;
				var titleElem;
				var progressBar;
				var currentProgress = 0;
				var interval;

				if (!match || !stage || !app || !template) return;

				difficulty = match[1].charAt(0).toUpperCase() + match[1].slice(1);
				clone = template.content.cloneNode(true);
				titleElem = clone.getElementById("skeleton-title");

				if (titleElem) {
					titleElem.textContent = `${difficulty} — Stage ${stage}`;
				}

				// If app already has content (like the main menu from a SPA fallback), clear it
				// unless it looks like it's already a skeleton or prerendered game UI.
				if (app.children.length > 0 && !app.querySelector(".route-progress-bar")) {
					app.innerHTML = "";
				}

				// Only append if app is now empty
				if (app.children.length === 0) {
					progressBar = clone
						.getElementById("skeleton-progress")
						?.querySelector(".route-progress-bar");

					if (progressBar) {
						/* __PROGRESS_LOGIC_PLACEHOLDER__ */
						interval = setInterval(() => {
							if (currentProgress < 88) {
								currentProgress = getNextTrickleProgress(currentProgress);
								progressBar.style.width = `${currentProgress}%`;
								window.__INITIAL_PROGRESS__ = currentProgress;
							}
						}, 100);
						window.__PROGRESS_INTERVAL__ = interval;
					}

					app.appendChild(clone);
				}
			})();
		</script>
		<script type="module" src="/src/index.tsx"></script>
	</body>
</html>
